<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phaser">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="shortcut icon" href="TemplateData/Phaser.ico">
  <link rel="manifest" href="manifest.json">
  <title>Anicable Studios | Phaser</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      background: radial-gradient(ellipse at bottom, #101827 0%, #02040a 65%, #000 100%);
      position: relative;
    }

    #starfield {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      will-change: transform;
    }

    .star-core {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: white;
      opacity: 0.75;
      box-shadow:
        0 0 6px rgba(255,255,255,0.55),
        0 0 14px rgba(255,255,255,0.2);
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .card {
      width: 100%;
      max-width: 430px;
      margin: 40px auto;
      background: transparent;
      border: none;
      border-radius: 18px;
      padding: 34px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease both;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: clamp(2.6rem, 13vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-shadow:
        0 0 10px rgba(255, 106, 0, 0.9),
        0 0 35px rgba(255, 106, 0, 0.35);
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.78);
      font-size: 1.25rem;
      line-height: 1.6;
    }

    .instructions {
      margin: 20px 0;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.065);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 50px rgba(0,0,0,0.28);
      text-align: left;
      line-height: 1.5;
    }

    .instructions p {
      margin-top: 0;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.78);
    }

    .instructions p:last-child {
      margin-bottom: 0;
    }

    .instructions strong {
      color: #ff9a2f;
    }

    .play-button {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 15px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.065);
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .play-button:hover,
    .play-button:focus-visible {
      transform: translateY(-3px) scale(1.03);
      background: linear-gradient(135deg, #ff6a00, #ff9d2e);
      border-color: rgba(255, 157, 46, 0.65);
      box-shadow: 0 0 28px rgba(255, 106, 0, 0.45);
      outline: none;
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.4;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      body {
        min-height: 100dvh;
        padding: 28px 18px 120px;
        padding-top: calc(28px + env(safe-area-inset-top));
        padding-bottom: calc(120px + env(safe-area-inset-bottom));
      }

      .card {
        width: 100%;
        max-width: 430px;
        margin: 0 auto;
        padding: 24px 18px;
      }

      h1 {
        margin-bottom: 28px;
      }
    }
  </style>
</head>

<body>
  <div id="starfield" aria-hidden="true"></div>

  <main class="card">
    <h1>Phaser</h1>
    <p class="subtitle">A space shooter by Anicable Studios.</p>

    <div id="ios-instructions" class="instructions">
      <p><strong>Best on iPhone/iPad:</strong></p>
      <p>Tap the <strong>Share</strong> button, then choose <strong>Add to Home Screen</strong>.</p>
      <p>Then launch Phaser from your Home Screen for the closest thing to fullscreen.</p>
    </div>

    <a class="play-button" href="https://phaser.anicable.com/">Play Phaser</a>

    <p class="small">
      If you are already using the Home Screen version, just tap Play.
    </p>
  </main>

<script>
function isMobile() {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
    || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function isIOS() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function isStandalone() {
  return window.navigator.standalone === true ||
    window.matchMedia("(display-mode: standalone)").matches;
}

const GAME_URL = "https://phaser.anicable.com/";

window.addEventListener("DOMContentLoaded", () => {
  const starfield = document.getElementById("starfield");
  const stars = [];

  function createStars() {
    if (!starfield) return;

    starfield.innerHTML = "";
    stars.length = 0;

    const count = Math.min(
      180,
      Math.max(90, Math.floor((window.innerWidth * window.innerHeight) / 9000))
    );

    const STAR_PAD = window.innerHeight;
    const totalHeight = window.innerHeight + STAR_PAD * 2;

    for (let i = 0; i < count; i++) {
      const star = document.createElement("div");
      star.className = "star";

      const core = document.createElement("div");
      core.className = "star-core";
      star.appendChild(core);

      const size = Math.random() * 2 + 1;

      star.style.left = "0px";
      star.style.top = "0px";
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;

      starfield.appendChild(star);

      stars.push({
        el: star,
        core,
        baseX: Math.random() * window.innerWidth,
        baseY: -STAR_PAD + Math.random() * totalHeight,
        driftX: (Math.random() - 0.5) * 18,
        driftY: (Math.random() - 0.5) * 18,
        speed: 0.25 + Math.random() * 0.8,
        twinkleSpeed: 0.8 + Math.random() * 2.0,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function animateStars() {
    const time = performance.now() * 0.001;

    for (const star of stars) {
      const moveX = Math.sin(time * star.speed + star.baseY * 0.01) * star.driftX;
      const moveY = Math.cos(time * star.speed + star.baseX * 0.01) * star.driftY;
      const twinkle = 0.75 + ((Math.sin(time * star.twinkleSpeed + star.twinkleOffset) + 1) * 0.5) * 0.5;

      star.el.style.transform = `translate(${star.baseX + moveX}px, ${star.baseY + moveY}px)`;
      star.core.style.opacity = Math.min(1, 0.35 + twinkle);
    }

    requestAnimationFrame(animateStars);
  }

  createStars();
  animateStars();

  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(createStars, 150);
  });
});

// Auto redirect when launched from Home Screen
if (isStandalone()) {
  window.location.replace(GAME_URL);
}

// Auto redirect desktop users
if (!isMobile()) {
  window.location.replace(GAME_URL);
}

// Hide iOS instructions if not iOS
const instructions = document.getElementById("ios-instructions");

if (!isIOS() && instructions) {
  instructions.style.display = "none";
}
</script>
</body>
</html>
