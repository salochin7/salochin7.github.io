<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type=""image/x-icon" href="Anicable.ico">
  <title>Anicable Studios</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-color: #000000;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 80px 120px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.8px 1.8px at 140px 60px, rgba(255,255,255,0.75), transparent),
        radial-gradient(1.2px 1.2px at 200px 150px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 260px 40px, rgba(255,255,255,0.85), transparent),
        radial-gradient(1.4px 1.4px at 320px 100px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.7px 1.7px at 400px 180px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.3px 1.3px at 500px 70px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 620px 140px, rgba(255,255,255,0.85), transparent),
        radial-gradient(1.2px 1.2px at 720px 40px, rgba(255,255,255,0.75), transparent);
      background-size: 800px 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(10, 14, 30, 0.88);
      border: 1px solid rgb(255, 255, 255);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.8);
    }

    .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
    }
    @media (max-width: 500px) {
    .links {
        grid-template-columns: 1fr;
    }
    }
    .links a {
      display: block;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #161b33, #1f2748);
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #ff5500, #ff7a33);
    }

    .release {
      margin-top: 10px;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 18px;
    }

    .release h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.2rem;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 166px;
      border: none;
      border-radius: 10px;
    }

    .note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }
    .soundContainer g-box-full {
      background-color: black;
    }
    .sc-wrapper iframe {
      opacity: 0.9;
      border-radius: 10px;
    }

    .release {
      background: rgba(0,0,0,0.4);
    }
        footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    pointer-events: none; /* so it doesn't block clicks */
    }

    footer span {
    background: rgba(0,0,0,0.4);
    padding: 6px 12px;
    border-radius: 8px;
    backdrop-filter: blur(3px);
    }
        .track {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      align-items: flex-start; /* 👈 key change */
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
    }

    .track img {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .track-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .track-title a {
      color: white;
      text-decoration: none;
    }

    .track-title a:hover {
      color: #ff7a33;
    }

    .track-date {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-bottom: 8px;
    }

        .track-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .play-btn {
      background: linear-gradient(135deg, #ff5500, #ff7a33);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
    }

    .play-btn:hover {
      opacity: 0.92;
    }

    .player-slot {
      margin-top: 10px;
      width: 100%;
    }

    .player-slot iframe {
      width: 100%;
      height: 166px;
      border: none;
      border-radius: 10px;
    }
        .track {
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .track:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }
        .track::before {
      content: "▶";
      font-size: 1.2rem;
      margin-right: 6px;
      opacity: 0.6;
    }

    .track:hover::before {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ANICABLE</h1>
    <p>Music and games.</p>

    <div class="links">
      <a href="https://soundcloud.com/anicable" target="_blank" rel="noopener noreferrer">
        🎵 SoundCloud
      </a>
      <a href="https://phaser.anicable.com" target="_blank" rel="noopener noreferrer">
        🚀 Play Phaser
      </a>
      <a href="https://twitch.tv/Anicable" target="_blank" rel="noopener noreferrer"> 
        📺 Twitch
      </a>
      <a href="https://buymeacoffee.com/salochin" target="_blank" rel="noopener noreferrer">
        🍺 Beer me
      </a>
    </div>
    <div class="release">
      <h2>Latest Release</h2>
      <div class="sc-wrapper">
        <iframe
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/anicable/Rings&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true">
        </iframe>
      </div>
    </div>

    <div class="release">
  <h2>All Tracks</h2>
  <div id="tracks"></div>
  <div id="loading" style="text-align:center; padding:10px; opacity:0.7;">
    Loading...
  </div>
</div>
  </div>

  <footer>
    <span>© 2026 Nicholas Noranbrock. All rights reserved.</span>
  </footer>

  <script>
window.addEventListener("DOMContentLoaded", () => {
  const API_URL = "https://project-mwaqf.vercel.app/api/tracks";

  let offset = 0;
  const limit = 10;
  let loading = false;
  let hasMore = true;
  let activePlayer = null;

  const container = document.getElementById("tracks");
  const loadingEl = document.getElementById("loading");

  if (!container || !loadingEl) {
    console.error("Missing #tracks or #loading element.");
    return;
  }

  function makeEmbedUrl(trackUrl) {
    const encoded = encodeURIComponent(trackUrl);
    return `https://w.soundcloud.com/player/?url=${encoded}&color=%23ff5500&auto_play=true&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true`;
  }

  function openPlayer(track, slot) {
    if (activePlayer && activePlayer !== slot) {
      activePlayer.innerHTML = "";
    }

    const isOpen = slot.innerHTML.trim() !== "";

    if (isOpen) {
      slot.innerHTML = "";
      if (activePlayer === slot) activePlayer = null;
      return;
    }

    slot.innerHTML = `
      <iframe
        allow="autoplay"
        src="${makeEmbedUrl(track.permalink_url)}">
      </iframe>
    `;

    activePlayer = slot;
  }

  async function loadTracks() {
    if (loading || !hasMore) return;

    loading = true;
    loadingEl.style.display = "block";
    loadingEl.textContent = "Loading...";

    try {
      const res = await fetch(`${API_URL}?offset=${offset}&limit=${limit}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      if (!data.tracks || !Array.isArray(data.tracks)) {
        throw new Error("Invalid API response");
      }

      if (data.tracks.length === 0 && offset === 0) {
        loadingEl.textContent = "No tracks found.";
        hasMore = false;
        loading = false;
        return;
      }

      data.tracks.forEach(track => {
        const el = document.createElement("div");
        el.className = "track";

        const artwork = track.artwork_url || "https://via.placeholder.com/60?text=%E2%99%AA";
        const dateText = track.created_at
          ? new Date(track.created_at).toLocaleDateString()
          : "Unknown date";

        el.innerHTML = `
          <img src="${artwork}" alt="${track.title}">
          <div class="track-info">
            <div class="track-title">${track.title}</div>
            <div class="track-date">${dateText}</div>
            <div class="track-actions">
              <button class="play-btn">▶ Play</button>
              <a href="${track.permalink_url}" target="_blank" rel="noopener noreferrer">Open in SoundCloud</a>
            </div>
            <div class="player-slot"></div>
          </div>
        `;

        const button = el.querySelector(".play-btn");
        const link = el.querySelector("a");
        const playerSlot = el.querySelector(".player-slot");

        // Whole track click
        el.addEventListener("click", (e) => {
          // Prevent clicks on button or link from triggering row click
          if (e.target.closest(".play-btn") || e.target.closest("a")) return;

          openPlayer(track, playerSlot);
        });

        // Button still works
        button.addEventListener("click", (e) => {
          e.stopPropagation();
          openPlayer(track, playerSlot);
        });

        // Link should not trigger player
        link.addEventListener("click", (e) => {
          e.stopPropagation();
        });

        container.appendChild(el);
      });

      offset += data.tracks.length;
      hasMore = Boolean(data.hasMore);
      loadingEl.textContent = hasMore ? "Scroll for more..." : "No more tracks";
    } catch (err) {
      console.error("Error loading tracks:", err);
      loadingEl.textContent = "Error loading tracks";
    }

    loading = false;
  }

  window.addEventListener("scroll", () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
      loadTracks();
    }
  });

  loadTracks();
});
</script>
</body>

</html>
