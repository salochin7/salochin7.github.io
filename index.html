<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

  <title>Anicable Studios</title>
  <style>
        * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: radial-gradient(ellipse at bottom, #101827 0%, #02040a 65%, #000 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

        #starfield {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      will-change: transform;
    }

    .star-core {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: white;
      opacity: 0.75;
      box-shadow:
        0 0 6px rgba(255,255,255,0.55),
        0 0 14px rgba(255,255,255,0.2);
      transform-origin: center center;
      will-change: transform, opacity;
    }

   .card {
  width: 100%;
  max-width: 1000px;
  margin: 40px auto;
  background: rgba(10, 14, 30, 0.88);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 18px;
  padding: 34px;
  text-align: center;
  box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.8s ease both;
}

h1 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: clamp(2rem, 6vw, 3.5rem);
  letter-spacing: 4px;
  text-shadow:
    0 0 10px rgba(255, 106, 0, 0.9),
    0 0 35px rgba(255, 106, 0, 0.35);
}

p {
  margin-top: 0;
  margin-bottom: 24px;
  color: rgba(255,255,255,0.78);
  line-height: 1.6;
}

.links {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 30px;
}

.links a {
  display: block;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.065);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 15px 18px;
  border-radius: 999px;
  font-weight: bold;
  transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.links a:hover {
  transform: translateY(-3px) scale(1.03);
  background: linear-gradient(135deg, #ff6a00, #ff9d2e);
  border-color: rgba(255, 157, 46, 0.65);
  box-shadow: 0 0 28px rgba(255, 106, 0, 0.45);
}

.release {
  margin-top: 18px;
  text-align: left;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  padding: 22px;
  background: rgba(255,255,255,0.065);
  box-shadow: 0 18px 50px rgba(0,0,0,0.28);
}

.release h2 {
  margin-top: 0;
  margin-bottom: 18px;
  padding-bottom: 10px;
  font-size: 1.4rem;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.16);
  text-shadow: 0 0 15px rgba(0, 170, 255, 0.35);
}

iframe {
  width: 100%;
  height: 166px;
  border: none;
  border-radius: 12px;
}

.note {
  margin-top: 10px;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.65);
  text-align: center;
}

.sc-wrapper iframe {
  opacity: 0.9;
  border-radius: 12px;
}

.track {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
  padding: 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
  flex-wrap: wrap;
  overflow: hidden;
}

.track:hover {
  background: rgba(255,255,255,0.095);
  transform: translateY(-3px);
  border-color: rgba(255, 157, 46, 0.55);
}

.track img {
  width: 64px;
  height: 64px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  image-rendering: auto;
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
}

.track-info {
  flex: 1;
  text-align: left;
  min-width: 0;
}

.track-title {
  font-weight: bold;
  margin-bottom: 4px;
}

.track-title a {
  color: white;
  text-decoration: none;
}

.track-title a:hover {
  color: #ff9d2e;
}

.track-date {
  font-size: 0.82rem;
  opacity: 0.6;
  margin-bottom: 8px;
}

.play-btn {
  background: linear-gradient(135deg, #ff6a00, #ff9d2e);
  color: white;
  border: none;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 1rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 0 20px rgba(255, 106, 0, 0.35);
}

.play-btn:hover {
  transform: scale(1.08);
  opacity: 0.95;
  box-shadow: 0 0 28px rgba(255, 106, 0, 0.55);
}

.player-slot {
  margin-top: 10px;
  width: 100%;
}

.player-slot iframe {
  width: 100%;
  height: 166px;
  border: none;
  border-radius: 12px;
}

#loading {
  color: rgba(255,255,255,0.7);
}

footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
  z-index: 1;
}

footer span {
  background: rgba(0,0,0,0.45);
  padding: 6px 12px;
  border-radius: 999px;
  backdrop-filter: blur(4px);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 720px) {
  body {
    padding: 18px;
  }

  .card {
    padding: 24px;
    margin: 24px auto;
  }

  .links {
    grid-template-columns: 1fr;
  }

  .track {
    align-items: flex-start;
  }

  .track img {
    width: 56px;
    height: 56px;
  }

  footer {
    position: static;
    margin-top: 24px;
  }
    }
  </style>

    <div class="release">
      <h2>Latest Release</h2>
      <div class="sc-wrapper">
        <iframe
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/anicable/Rings&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true">
        </iframe>
      </div>
    </div>

    <div class="release">
      <h2>All Tracks</h2>
      <div id="tracks"></div>
      <div id="loading" style="text-align:center; padding:10px; opacity:0.7;">
        Loading...
      </div>
    </div>
  </div>

  <footer>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      let lastScrollY = window.scrollY;
      let targetStretch = 0;
      let currentStretch = 0;
      let scrollDirection = 1;
      const starfield = document.getElementById("starfield");
      const stars = [];
      const STAR_COUNT = Math.min(180, Math.max(90, Math.floor((window.innerWidth * window.innerHeight) / 9000)));

      function createStars() {
      if (!starfield) return;

      starfield.innerHTML = "";
      stars.length = 0;

      const count = Math.min(
        180,
        Math.max(90, Math.floor((window.innerWidth * window.innerHeight) / 9000))
      );

      const STAR_PAD = window.innerHeight * 1.0;
      const totalHeight = window.innerHeight + STAR_PAD * 2;

      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        star.className = "star";

        const core = document.createElement("div");
        core.className = "star-core";
        star.appendChild(core);

        const x = Math.random() * window.innerWidth;
        const y = -STAR_PAD + Math.random() * totalHeight;
        const size = Math.random() * 2 + 1;

        star.style.left = "0px";
        star.style.top = "0px";
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;

        starfield.appendChild(star);

        stars.push({
          el: star,
          core,
          baseX: x,
          baseY: y,
          driftX: (Math.random() - 0.5) * 18,
          driftY: (Math.random() - 0.5) * 18,
          speed: 0.25 + Math.random() * 0.8,
          scrollFactor: 0.03 + Math.random() * 0.08,
          twinkleSpeed: 0.8 + Math.random() * 2.0,
          twinkleOffset: Math.random() * Math.PI * 2
        });
      }
    }

      function animateStars() {
      const scrollY = window.scrollY;
      const time = performance.now() * 0.001;
      const STAR_PAD = window.innerHeight * 1.0;
      const totalHeight = window.innerHeight + STAR_PAD * 2;

      const rawDelta = scrollY - lastScrollY;
      lastScrollY = scrollY;

      if (Math.abs(rawDelta) > 0.01) {
        scrollDirection = rawDelta > 0 ? 1 : -1;
      }

      targetStretch = Math.min(8, Math.abs(rawDelta) * 0.35);

      // smooth the effect so it doesn't disappear instantly
      currentStretch += (targetStretch - currentStretch) * 0.18;
      currentStretch *= 0.92;

      for (const star of stars) {
        const moveX = Math.sin(time * star.speed + star.baseY * 0.01) * star.driftX;
        const moveY = Math.cos(time * star.speed + star.baseX * 0.01) * star.driftY;
        const parallaxY = scrollY * star.scrollFactor;

        let finalY = star.baseY + moveY + parallaxY;

        while (finalY < -STAR_PAD) finalY += totalHeight;
        while (finalY > window.innerHeight + STAR_PAD) finalY -= totalHeight;

        const finalX = star.baseX + moveX;

        star.el.style.transform = `translate(${finalX}px, ${finalY}px)`;

        // twinkle
        const twinkle = 0.75 + ((Math.sin(time * star.twinkleSpeed + star.twinkleOffset) + 1) * 0.5) * 0.5;

        // hyperspeed streak
        const stretchY = 1 + currentStretch * 1.6;
        const squeezeX = Math.max(0.2, 1 - currentStretch * 0.18);

        star.core.style.opacity = Math.min(1, 0.35 + twinkle + currentStretch * 0.08);
        star.core.style.transformOrigin = scrollDirection > 0 ? "center top" : "center bottom";
        star.core.style.transform = `
  scale(${squeezeX}, ${stretchY})
`;
      }

      requestAnimationFrame(animateStars);
    }

      createStars();
      animateStars();

      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(createStars, 150);
      });

      const API_URL = "https://project-mwaqf.vercel.app/api/tracks";

      let offset = 0;
      const limit = 10;
      let loading = false;
      let hasMore = true;
      let activePlayer = null;

      const container = document.getElementById("tracks");
      const loadingEl = document.getElementById("loading");

      if (!container || !loadingEl) {
        console.error("Missing #tracks or #loading element.");
        return;
      }

      function makeEmbedUrl(trackUrl) {
        const encoded = encodeURIComponent(trackUrl);
        return `https://w.soundcloud.com/player/?url=${encoded}&color=%23ff5500&auto_play=true&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true`;
      }

      function openPlayer(track, slot) {
        if (activePlayer && activePlayer !== slot) {
          activePlayer.innerHTML = "";
        }

        const isOpen = slot.innerHTML.trim() !== "";

        if (isOpen) {
          slot.innerHTML = "";
          if (activePlayer === slot) activePlayer = null;
          return;
        }

        slot.innerHTML = `
          <iframe
            allow="autoplay"
            src="${makeEmbedUrl(track.permalink_url)}">
          </iframe>
        `;

        activePlayer = slot;
      }

      async function loadTracks() {
        if (loading || !hasMore) return;

        loading = true;
        loadingEl.style.display = "block";
        loadingEl.textContent = "Loading...";

        try {
          const res = await fetch(`${API_URL}?offset=${offset}&limit=${limit}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();

          if (!data.tracks || !Array.isArray(data.tracks)) {
            throw new Error("Invalid API response");
          }

          if (data.tracks.length === 0 && offset === 0) {
            loadingEl.textContent = "No tracks found.";
            hasMore = false;
            loading = false;
            return;
          }

          data.tracks.forEach(track => {
            const el = document.createElement("div");
            el.className = "track";

            const img = document.createElement("img");
            img.src = track.artwork_url || "/images/Placeholder.jpg";
            img.alt = track.title || "Track artwork";
            img.onerror = () => {
              img.src = "/images/Placeholder.jpg";
            };

            const info = document.createElement("div");
            info.className = "track-info";

            const title = document.createElement("div");
            title.className = "track-title";
            title.textContent = track.title || "Untitled";

            const date = document.createElement("div");
            date.className = "track-date";
            date.textContent = track.created_at
              ? new Date(track.created_at).toLocaleDateString()
              : "Unknown date";

            const playerSlot = document.createElement("div");
            playerSlot.className = "player-slot";

            const button = document.createElement("button");
            button.className = "play-btn";
            button.type = "button";
            button.textContent = "▶";

            info.appendChild(title);
            info.appendChild(date);

            el.appendChild(img);
            el.appendChild(info);
            el.appendChild(button);
            el.appendChild(playerSlot);

            el.addEventListener("click", (e) => {
              if (e.target.closest(".play-btn")) return;
              openPlayer(track, playerSlot);
            });

            button.addEventListener("click", (e) => {
              e.stopPropagation();
              openPlayer(track, playerSlot);
            });

            container.appendChild(el);
          });

          offset += data.tracks.length;
          hasMore = Boolean(data.hasMore);
          loadingEl.textContent = hasMore ? "Scroll for more..." : "No more tracks";
        } catch (err) {
          console.error("Error loading tracks:", err);
          loadingEl.textContent = "Error loading tracks";
        }

        loading = false;
      }

      window.addEventListener("scroll", () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
          loadTracks();
        }
      });

      loadTracks();
    });
  </script>
