<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <meta name="description" content="Anicable Studios | Music & Games | Listen or play now!">
  <title>Anicable Studios</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

        #starfield {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      will-change: transform;
    }

    .star-core {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: white;
      opacity: 0.75;
      box-shadow:
        0 0 6px rgba(255,255,255,0.55),
        0 0 14px rgba(255,255,255,0.2);
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(10, 14, 30, 0.88);
      border: 1px solid rgb(255, 255, 255);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 1;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.8);
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    @media (max-width: 500px) {
      .links {
        grid-template-columns: 1fr;
      }
    }

    .links a {
      display: block;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #161b33, #1f2748);
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #ff5500, #ff7a33);
    }

    .release {
      margin-top: 10px;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 18px;
      background: rgba(0,0,0,0.4);
    }

    .release h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.2rem;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 166px;
      border: none;
      border-radius: 10px;
    }

    .note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }

    .soundContainer g-box-full {
      background-color: black;
    }

    .sc-wrapper iframe {
      opacity: 0.9;
      border-radius: 10px;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      z-index: 1;
    }

    footer span {
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 8px;
      backdrop-filter: blur(3px);
    }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      flex-wrap: wrap;
    }

    .track:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }

    .track img {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .track-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .track-title a {
      color: white;
      text-decoration: none;
    }

    .track-title a:hover {
      color: #ff7a33;
    }

    .track-date {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-bottom: 8px;
    }

    .track-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .play-btn {
      background: linear-gradient(135deg, #ff5500, #ff7a33);
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    .play-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .player-slot {
      margin-top: 10px;
      width: 100%;
    }

    .player-slot iframe {
      width: 100%;
      height: 166px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="starfield" aria-hidden="true"></div>

  <div class="card">
    <h1>ANICABLE STUDIOS</h1>
    <p>Music and games.</p>

    <div class="links">
      <a href="https://soundcloud.com/anicable" target="_blank" rel="noopener noreferrer">
        🎵 SoundCloud
      </a>
      <a href="https://phaser.anicable.com" target="_blank" rel="noopener noreferrer">
        🚀 Play Phaser
      </a>
      <a href="https://twitch.tv/Anicable" target="_blank" rel="noopener noreferrer"> 
        📺 Twitch
      </a>
      <a href="https://discord.gg/Guss6Kr2Cn" target="_blank" rel="noopener noreferrer">
        👾 Phaser Discord
      </a>
    </div>

    <div class="release">
      <h2>Latest Release</h2>
      <div class="sc-wrapper">
        <iframe
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/anicable/Rings&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true">
        </iframe>
      </div>
    </div>

    <div class="release">
      <h2>All Tracks</h2>
      <div id="tracks"></div>
      <div id="loading" style="text-align:center; padding:10px; opacity:0.7;">
        Loading...
      </div>
    </div>
  </div>

  <footer>
    <span>© 2026 Nicholas Noranbrock. All rights reserved.</span>
  </footer>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      let lastScrollY = window.scrollY;
      let targetStretch = 0;
      let currentStretch = 0;
      let scrollDirection = 1;
      const starfield = document.getElementById("starfield");
      const stars = [];
      const STAR_COUNT = Math.min(180, Math.max(90, Math.floor((window.innerWidth * window.innerHeight) / 9000)));

      function createStars() {
      if (!starfield) return;

      starfield.innerHTML = "";
      stars.length = 0;

      const count = Math.min(
        180,
        Math.max(90, Math.floor((window.innerWidth * window.innerHeight) / 9000))
      );

      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        star.className = "star";

        const core = document.createElement("div");
        core.className = "star-core";
        star.appendChild(core);

        const x = Math.random() * window.innerWidth;
        const y = Math.random() * Math.max(window.innerHeight, document.documentElement.scrollHeight);
        const size = Math.random() * 2 + 1;

        star.style.left = `${x}px`;
        star.style.top = `${y}px`;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;

        starfield.appendChild(star);

        stars.push({
          el: star,
          core,
          baseX: x,
          baseY: y,
          driftX: (Math.random() - 0.5) * 18,
          driftY: (Math.random() - 0.5) * 18,
          speed: 0.25 + Math.random() * 0.8,
          scrollFactor: 0.03 + Math.random() * 0.08,
          twinkleSpeed: 0.8 + Math.random() * 2.0,
          twinkleOffset: Math.random() * Math.PI * 2
        });
      }
    }

      function animateStars() {
      const scrollY = window.scrollY;
      const time = performance.now() * 0.001;

      const rawDelta = scrollY - lastScrollY;
      lastScrollY = scrollY;

      if (Math.abs(rawDelta) > 0.01) {
        scrollDirection = rawDelta > 0 ? 1 : -1;
      }

      targetStretch = Math.min(8, Math.abs(rawDelta) * 0.35);

      // smooth the effect so it doesn't disappear instantly
      currentStretch += (targetStretch - currentStretch) * 0.18;
      currentStretch *= 0.92;

      for (const star of stars) {
        const moveX = Math.sin(time * star.speed + star.baseY * 0.01) * star.driftX;
        const moveY = Math.cos(time * star.speed + star.baseX * 0.01) * star.driftY;
        const parallaxY = scrollY * star.scrollFactor;

        // outer layer handles movement only
        star.el.style.transform = `translate(${moveX}px, ${moveY + parallaxY}px)`;

        // twinkle
        const twinkle = 0.75 + ((Math.sin(time * star.twinkleSpeed + star.twinkleOffset) + 1) * 0.5) * 0.5;

        // hyperspeed streak
        const stretchY = 1 + currentStretch * 1.6;
        const squeezeX = Math.max(0.2, 1 - currentStretch * 0.18);

        // slight directional skew helps sell the streak effect
        const skew = currentStretch * 4 * scrollDirection;

        star.core.style.opacity = Math.min(1, 0.35 + twinkle + currentStretch * 0.08);
        star.core.style.transform = `scale(${squeezeX}, ${stretchY}) skewY(${skew}deg)`;
      }

      requestAnimationFrame(animateStars);
    }

      createStars();
      animateStars();

      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(createStars, 150);
      });

      const API_URL = "https://project-mwaqf.vercel.app/api/tracks";

      let offset = 0;
      const limit = 10;
      let loading = false;
      let hasMore = true;
      let activePlayer = null;

      const container = document.getElementById("tracks");
      const loadingEl = document.getElementById("loading");

      if (!container || !loadingEl) {
        console.error("Missing #tracks or #loading element.");
        return;
      }

      function makeEmbedUrl(trackUrl) {
        const encoded = encodeURIComponent(trackUrl);
        return `https://w.soundcloud.com/player/?url=${encoded}&color=%23ff5500&auto_play=true&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=true`;
      }

      function openPlayer(track, slot) {
        if (activePlayer && activePlayer !== slot) {
          activePlayer.innerHTML = "";
        }

        const isOpen = slot.innerHTML.trim() !== "";

        if (isOpen) {
          slot.innerHTML = "";
          if (activePlayer === slot) activePlayer = null;
          return;
        }

        slot.innerHTML = `
          <iframe
            allow="autoplay"
            src="${makeEmbedUrl(track.permalink_url)}">
          </iframe>
        `;

        activePlayer = slot;
      }

      async function loadTracks() {
        if (loading || !hasMore) return;

        loading = true;
        loadingEl.style.display = "block";
        loadingEl.textContent = "Loading...";

        try {
          const res = await fetch(`${API_URL}?offset=${offset}&limit=${limit}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();

          if (!data.tracks || !Array.isArray(data.tracks)) {
            throw new Error("Invalid API response");
          }

          if (data.tracks.length === 0 && offset === 0) {
            loadingEl.textContent = "No tracks found.";
            hasMore = false;
            loading = false;
            return;
          }

          data.tracks.forEach(track => {
            const el = document.createElement("div");
            el.className = "track";

            const img = document.createElement("img");
            img.src = track.artwork_url || "/images/Placeholder.jpg";
            img.alt = track.title || "Track artwork";
            img.onerror = () => {
              img.src = "/images/Placeholder.jpg";
            };

            const info = document.createElement("div");
            info.className = "track-info";

            const title = document.createElement("div");
            title.className = "track-title";
            title.textContent = track.title || "Untitled";

            const date = document.createElement("div");
            date.className = "track-date";
            date.textContent = track.created_at
              ? new Date(track.created_at).toLocaleDateString()
              : "Unknown date";

            const playerSlot = document.createElement("div");
            playerSlot.className = "player-slot";

            const button = document.createElement("button");
            button.className = "play-btn";
            button.type = "button";
            button.textContent = "▶";

            info.appendChild(title);
            info.appendChild(date);

            el.appendChild(img);
            el.appendChild(info);
            el.appendChild(button);
            el.appendChild(playerSlot);

            el.addEventListener("click", (e) => {
              if (e.target.closest(".play-btn")) return;
              openPlayer(track, playerSlot);
            });

            button.addEventListener("click", (e) => {
              e.stopPropagation();
              openPlayer(track, playerSlot);
            });

            container.appendChild(el);
          });

          offset += data.tracks.length;
          hasMore = Boolean(data.hasMore);
          loadingEl.textContent = hasMore ? "Scroll for more..." : "No more tracks";
        } catch (err) {
          console.error("Error loading tracks:", err);
          loadingEl.textContent = "Error loading tracks";
        }

        loading = false;
      }

      window.addEventListener("scroll", () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
          loadTracks();
        }
      });

      loadTracks();
    });
  </script>
</body>
